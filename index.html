<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d0d1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CodeWisdom — Os 5 da Sabedoria</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar"></aside>
  <div id="main">
    <header id="header">
      <div class="logo">Code<span>Wisdom</span></div>
      <div class="header-right">
        <div class="streak-badge" id="streak-val">🔥 0 dias</div>
        <div class="xp-badge" id="xp-val">⚡ 0 XP</div>
      </div>
    </header>

    <div class="tela ativa" id="tela-home"><div id="home-content"></div></div>
    <div class="tela" id="tela-trilhas"><div id="trilhas-content"></div></div>
    <div class="tela" id="tela-licao"><div id="licao-content"></div></div>
    <div class="tela" id="tela-ranking">
      <div style="text-align:center;padding:60px 20px">
        <div style="font-size:64px;margin-bottom:16px">🏆</div>
        <h2 style="font-size:24px;font-weight:900;margin-bottom:8px">Ranking</h2>
        <p style="color:var(--text2);margin-bottom:32px">Em breve! Continue estudando para subir.</p>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;max-width:300px;margin:0 auto">
          <div style="font-size:13px;color:var(--text2);margin-bottom:4px">Seu XP atual</div>
          <div id="rank-xp" style="font-size:40px;font-weight:900;color:var(--purple2)">0 XP</div>
        </div>
      </div>
    </div>
    <div class="tela" id="tela-revisao"><div id="revisao-content"></div></div>
    <div class="tela" id="tela-perfil"><div id="perfil-content"></div></div>

    <nav id="nav-bottom">
      <div class="nav-item ativo" onclick="navegarTela('home')">
        <span class="ni">🏠</span><span>Início</span>
      </div>
      <div class="nav-item" onclick="navegarTela('trilhas')">
        <span class="ni">🗺️</span><span>Trilhas</span>
      </div>
      <div class="nav-item" onclick="navegarTela('ranking')">
        <span class="ni">🏆</span><span>Ranking</span>
      </div>
      <div class="nav-item" onclick="navegarTela('revisao')">
        <span class="ni">🔀</span><span>Revisão</span>
      </div>
      <div class="nav-item" onclick="navegarTela('perfil')">
        <span class="ni">👤</span><span>Perfil</span>
      </div>
    </nav>
  </div>
</div>

<!-- LIÇÕES -->
<script src="licoes/coruja.js"></script>
<script src="licoes/elefante.js"></script>
<script src="licoes/tartaruga.js"></script>
<script src="licoes/lobo.js"></script>
<script src="licoes/corvo.js"></script>
<script src="licoes/leao.js"></script>

<!-- APP -->
<script src="app.js"></script>

<!-- SERVICE WORKER (PWA offline + auto-update) -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    // verifica atualização sempre que o app abre
    reg.update()
    reg.addEventListener('updatefound', () => {
      const novoSW = reg.installing
      novoSW.addEventListener('statechange', () => {
        if (novoSW.state === 'activated') {
          // nova versão já está ativa — recarrega para usar ela
          console.log('Nova versão do CodeWisdom instalada!')
        }
      })
    })
  }).catch(() => {})

  // quando o novo SW assume controle, recarrega a página automaticamente
  let recarregando = false
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (recarregando) return
    recarregando = true
    window.location.reload()
  })
}
</script>

</body>
</html>
