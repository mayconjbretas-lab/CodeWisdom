<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0d0d1a">
<title>CodeWisdom — Os 5 da Sabedoria</title>
<style>
/* ============================================================
   CodeWisdom — Style
   Dark theme inspirado no design dos mockups
   ============================================================ */

:root {
  --bg: #0d0d1a;
  --surface: #13132a;
  --surface2: #1a1a35;
  --surface3: #22224a;
  --border: rgba(124,111,247,0.15);
  --border2: rgba(124,111,247,0.35);
  --purple: #7c6ff7;
  --purple2: #a78bfa;
  --purple3: #c4b5fd;
  --text: #f0f0ff;
  --text2: #94a3b8;
  --text3: #64748b;
  --green: #10b981;
  --green2: #6ee7b7;
  --red: #ef4444;
  --yellow: #f59e0b;
  --orange: #ff6b35;
  --blue: #3b82f6;
  --radius: 14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

/* ── LAYOUT GERAL ── */
#app { display: flex; flex-direction: column; min-height: 100vh; }

/* ── HEADER ── */
#header {
  background: #1a1a2e;
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
.logo span { color: var(--purple2); }
.header-right { display: flex; align-items: center; gap: 12px; }
.xp-badge {
  background: var(--purple);
  color: #fff; font-size: 13px; font-weight: 700;
  padding: 5px 12px; border-radius: 20px;
  display: flex; align-items: center; gap: 5px;
}
.streak-badge {
  background: var(--surface2);
  color: var(--orange); font-size: 13px; font-weight: 700;
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--border);
  display: flex; align-items: center; gap: 5px;
}

/* ── TELAS ── */
.tela { display: none; flex: 1; padding: 24px 20px 80px; max-width: 720px; margin: 0 auto; width: 100%; }
.tela.ativa { display: block; }

/* ── TELA INICIAL ── */
.home-hero {
  text-align: center;
  padding: 32px 0 40px;
}
.home-hero h1 { font-size: clamp(28px, 6vw, 48px); font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; }
.home-hero h1 span { color: var(--purple2); }
.home-hero p { color: var(--text2); font-size: 16px; margin-bottom: 32px; }
.mascot-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}
@media(min-width:500px) { .mascot-grid { grid-template-columns: repeat(5, 1fr); } }
.mascot-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 8px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: var(--text2);
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.mascot-btn:hover { border-color: var(--border2); transform: translateY(-3px); color: var(--purple2); }
.mascot-btn.ativo { border-color: var(--purple); background: rgba(124,111,247,0.1); color: var(--purple2); }
.mascot-btn.bloqueado { opacity: 0.4; cursor: not-allowed; }
.mascot-btn .e { font-size: 28px; }
.progresso-mini {
  height: 3px; width: 100%; background: var(--surface3); border-radius: 2px; margin-top: 4px; overflow: hidden;
}
.progresso-mini-fill { height: 100%; background: var(--purple); border-radius: 2px; transition: width 0.5s; }

/* ── CARD DO ANIMAL SELECIONADO ── */
.animal-destaque {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 24px;
}
.animal-header {
  padding: 20px;
  display: flex; gap: 16px; align-items: center;
}
.animal-avatar {
  width: 64px; height: 64px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.15);
}
.animal-info h2 { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
.animal-info .fase { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.animal-info .quote { font-size: 13px; color: var(--text3); font-style: italic; }
.fase-pill {
  display: inline-block;
  background: rgba(124,111,247,0.15); color: var(--purple2);
  font-size: 11px; padding: 3px 8px; border-radius: 8px; font-weight: 600;
  margin-bottom: 6px;
}
.progresso-barra {
  padding: 0 20px 16px;
  border-top: 1px solid var(--border);
  padding-top: 14px;
}
.prog-lbl { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.prog-track { height: 8px; background: var(--surface3); border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--purple), var(--purple2)); transition: width 0.6s ease; }

/* ── TRILHAS ── */
.trilhas-titulo {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text3); padding: 14px 20px 8px; font-weight: 600;
}
.trilha-card {
  display: flex; gap: 12px; align-items: center;
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.trilha-card:hover:not(.bloqueada) { background: rgba(124,111,247,0.05); }
.trilha-card.bloqueada { opacity: 0.5; cursor: not-allowed; }
.trilha-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
}
.trilha-info { flex: 1; }
.trilha-nome { font-size: 14px; font-weight: 600; }
.trilha-desc { font-size: 12px; color: var(--text2); }
.trilha-meta { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
.badge {
  font-size: 10px; padding: 2px 7px; border-radius: 6px; font-weight: 600;
}
.badge-blue { background: rgba(59,130,246,0.15); color: #93c5fd; }
.badge-green { background: rgba(16,185,129,0.15); color: #6ee7b7; }
.badge-gray { background: var(--surface3); color: var(--text3); }
.badge-amber { background: rgba(245,158,11,0.15); color: #fcd34d; }
.badge-red { background: rgba(239,68,68,0.15); color: #fca5a5; }
.estrelas { display: flex; gap: 2px; }
.estrela { font-size: 10px; color: var(--yellow); }
.estrela.vazia { color: var(--surface3); }

/* ── NÓS DE LIÇÕES ── */
.nos-licoes { padding: 16px 20px; border-top: 1px solid var(--border); }
.nos-titulo { font-size: 11px; color: var(--text3); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
.nos-row { display: flex; align-items: center; }
.no {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  flex-shrink: 0; transition: all 0.2s; cursor: pointer; border: 2px solid transparent;
}
.no.feito { background: var(--purple); color: #fff; }
.no.atual { background: #fff; border-color: var(--purple); box-shadow: 0 0 0 4px rgba(124,111,247,0.2); }
.no.travado { background: var(--surface3); border-color: var(--border); color: var(--text3); cursor: not-allowed; }
.no-linha { flex: 1; height: 3px; background: var(--border); }
.no-linha.feita { background: var(--purple); }

/* ── TELA DE LIÇÃO ── */
.licao-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px;
}
.btn-voltar {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 8px 14px; border-radius: 10px;
  cursor: pointer; font-size: 13px; transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.btn-voltar:hover { border-color: var(--border2); color: var(--text); }
.licao-titulo { font-size: 18px; font-weight: 700; }
.licao-xp { background: rgba(124,111,247,0.15); color: var(--purple2); font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 8px; margin-left: auto; }

/* ETAPAS */
.etapas { display: flex; gap: 6px; margin-bottom: 20px; }
.etapa-dot {
  flex: 1; height: 4px; border-radius: 2px;
  background: var(--surface3); transition: background 0.3s;
}
.etapa-dot.ativa { background: var(--purple2); }
.etapa-dot.feita { background: var(--purple); }

/* TEORIA */
.teoria-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}
.teoria-box h3 { font-size: 16px; margin-bottom: 12px; color: var(--purple2); }
.teoria-box p { color: var(--text2); margin-bottom: 12px; font-size: 14px; line-height: 1.7; }
.teoria-box ul { padding-left: 20px; color: var(--text2); font-size: 14px; }
.teoria-box li { margin-bottom: 4px; }
.teoria-box strong { color: var(--text); }
.teoria-box code { background: var(--surface3); padding: 1px 5px; border-radius: 4px; font-size: 13px; color: var(--purple3); }

/* CÓDIGO */
.code-example {
  background: #0a0a18;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: 'Fira Code', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.8;
  margin: 12px 0;
  overflow-x: auto;
  white-space: pre;
}
.c-kw { color: #c792ea; } /* keywords */
.c-fn { color: #82aaff; } /* functions */
.c-str { color: #c3e88d; } /* strings */
.c-num { color: #f78c6c; } /* numbers */
.c-cm { color: #546e7a; } /* comments */

/* EXERCÍCIO */
.exercicio-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}
.exercicio-num { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.exercicio-pergunta { font-size: 15px; font-weight: 600; margin-bottom: 16px; white-space: pre-line; }
.opcoes { display: flex; flex-direction: column; gap: 8px; }
.opcao {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text);
  transition: all 0.15s;
  text-align: left;
}
.opcao:hover:not(:disabled) { border-color: var(--purple); background: rgba(124,111,247,0.08); }
.opcao.correta { background: rgba(16,185,129,0.15); border-color: var(--green); color: var(--green2); }
.opcao.errada { background: rgba(239,68,68,0.15); border-color: var(--red); color: #fca5a5; }
.opcao:disabled { cursor: default; }

/* COMPLETAR */
.completar-wrap { display: flex; flex-direction: column; gap: 12px; }
.completar-codigo {
  background: #0a0a18;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  font-family: monospace; font-size: 14px;
  color: var(--text2); line-height: 1.8;
  white-space: pre-wrap;
}
.completar-input {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 14px;
  color: var(--text);
  outline: none;
  font-family: monospace;
  transition: border-color 0.15s;
}
.completar-input:focus { border-color: var(--purple); }
.completar-input.correta { border-color: var(--green); background: rgba(16,185,129,0.08); }
.completar-input.errada { border-color: var(--red); background: rgba(239,68,68,0.08); }

/* FEEDBACK */
.feedback {
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13px;
  margin-top: 8px;
  display: none;
  line-height: 1.6;
}
.feedback.visivel { display: block; }
.feedback.ok { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--green2); }
.feedback.erro { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
.feedback strong { display: block; margin-bottom: 4px; }

/* BOTÕES */
.btn {
  padding: 13px 24px;
  border-radius: 12px;
  font-size: 14px; font-weight: 700;
  border: none; cursor: pointer;
  transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-primario {
  background: linear-gradient(135deg, var(--purple), var(--purple2));
  color: #fff;
  box-shadow: 0 4px 16px rgba(124,111,247,0.35);
  width: 100%;
  justify-content: center;
  margin-top: 12px;
}
.btn-primario:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,111,247,0.45); }
.btn-primario:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secundario {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border2);
  width: 100%;
  justify-content: center;
  margin-top: 8px;
}
.btn-secundario:hover { background: var(--surface3); color: var(--text); }

/* XP POPUP */
.xp-popup {
  position: fixed;
  top: 70px; right: 20px;
  background: var(--purple);
  color: #fff;
  padding: 10px 18px;
  border-radius: 20px;
  font-weight: 700; font-size: 14px;
  animation: popUp 2s forwards;
  pointer-events: none;
  z-index: 999;
}
@keyframes popUp {
  0% { opacity: 0; transform: translateY(10px) scale(0.8); }
  20% { opacity: 1; transform: translateY(0) scale(1); }
  70% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-20px); }
}

/* CONCLUSÃO DE LIÇÃO */
.conclusao {
  text-align: center;
  padding: 40px 20px;
  animation: fadeIn 0.4s ease;
}
.conclusao .trophy { font-size: 64px; margin-bottom: 16px; }
.conclusao h2 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
.conclusao p { color: var(--text2); margin-bottom: 24px; }
.xp-ganho {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(124,111,247,0.15); color: var(--purple2);
  font-size: 20px; font-weight: 800;
  padding: 10px 24px; border-radius: 16px; margin-bottom: 24px;
}
.erros-box {
  background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
  border-radius: 12px; padding: 14px; margin-bottom: 16px; text-align: left;
}
.erros-box h4 { color: #fca5a5; font-size: 13px; margin-bottom: 8px; }
.erros-box li { font-size: 13px; color: var(--text2); margin-bottom: 4px; }

/* PERFIL */
.perfil-stats {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px; text-align: center;
}
.stat-card .num { font-size: 28px; font-weight: 900; color: var(--purple2); }
.stat-card .lbl { font-size: 12px; color: var(--text3); margin-top: 2px; }
.debito-tecnico {
  background: var(--surface);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: var(--radius);
  padding: 16px;
}
.debito-tecnico h3 { font-size: 14px; font-weight: 700; color: #fca5a5; margin-bottom: 12px; }
.debito-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 13px; color: var(--text2);
}
.debito-item:last-child { border-bottom: none; }
.debito-count {
  margin-left: auto; font-size: 11px; font-weight: 700;
  background: rgba(239,68,68,0.15); color: #fca5a5;
  padding: 2px 8px; border-radius: 6px;
}

/* NAV BOTTOM */
#nav-bottom {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around;
  padding: 10px 0 14px;
  z-index: 100;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  opacity: 0.45; cursor: pointer; transition: opacity 0.15s;
  font-size: 10px; color: var(--text2); padding: 0 12px;
}
.nav-item.ativo { opacity: 1; color: var(--purple2); }
.nav-item .ni { font-size: 22px; }

/* ANIMAÇÕES */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fadeIn { animation: fadeIn 0.3s ease; }

/* RESPONSIVE */
@media(max-width: 480px) {
  .tela { padding: 16px 14px 80px; }
  .teoria-box, .exercicio-box { padding: 16px; }
}

</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="logo">Code<span>Wisdom</span></div>
    <div class="header-right">
      <div class="streak-badge" id="streak-val">🔥 0 dias</div>
      <div class="xp-badge" id="xp-val">⚡ 0 XP</div>
    </div>
  </header>
  <div class="tela ativa" id="tela-home"><div id="home-content"></div></div>
  <div class="tela" id="tela-trilhas"><div id="trilhas-content"></div></div>
  <div class="tela" id="tela-licao"><div id="licao-content"></div></div>
  <div class="tela" id="tela-ranking">
    <div style="text-align:center;padding:60px 20px">
      <div style="font-size:48px;margin-bottom:16px">🏆</div>
      <h2 style="font-size:22px;font-weight:800;margin-bottom:8px">Ranking</h2>
      <p style="color:var(--text2)">Em breve! Continue estudando para subir no ranking.</p>
      <div style="margin-top:32px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px">
        <div style="font-size:14px;color:var(--text2);margin-bottom:4px">Seu XP atual</div>
        <div id="rank-xp" style="font-size:36px;font-weight:900;color:var(--purple2)">0 XP</div>
      </div>
    </div>
  </div>
  <div class="tela" id="tela-perfil"><div id="perfil-content"></div></div>
  <nav id="nav-bottom">
    <div class="nav-item ativo" onclick="navegarTela('home')"><span class="ni">🏠</span><span>Início</span></div>
    <div class="nav-item" onclick="navegarTela('trilhas')"><span class="ni">🗺️</span><span>Trilhas</span></div>
    <div class="nav-item" onclick="navegarTela('ranking');document.getElementById('rank-xp').textContent=estado.xp+' XP'"><span class="ni">🏆</span><span>Ranking</span></div>
    <div class="nav-item" onclick="navegarTela('perfil')"><span class="ni">👤</span><span>Perfil</span></div>
  </nav>
</div>
<script src="licoes/coruja.js"></script>
<script>
// ============================================================
// CodeWisdom — app.js
// Lógica completa: progresso, XP, lições, exercícios
// ============================================================

// ── ESTADO GLOBAL ────────────────────────────────────────────
const ESTADO_INICIAL = {
  xp: 0,
  streak: 0,
  ultimoAcesso: null,
  animalAtual: 'coruja',
  animaisDesbloqueados: ['coruja'],
  progresso: {
    coruja: { licoesFeitas: [], erros: {} },
    elefante: { licoesFeitas: [], erros: {} },
    tartaruga: { licoesFeitas: [], erros: {} },
    lobo: { licoesFeitas: [], erros: {} },
    corvo: { licoesFeitas: [], erros: {} },
    leao: { licoesFeitas: [], erros: {} }
  }
}

let estado = carregarEstado()
let licaoAtual = null
let etapaAtual = 0 // 0=teoria, 1=exemplo, 2..=exercicios
let exercicioAtual = 0
let respostasErradas = []
let respondido = false

// ── DADOS DOS ANIMAIS ─────────────────────────────────────────
const ANIMAIS = {
  coruja: {
    emoji: '🦉', nome: 'Athena, a Coruja',
    quote: '"A lógica é a raiz de tudo"',
    fase: 'Fase 1 · Lógica & Fundamentos',
    bg: 'linear-gradient(135deg,#2d2066,#4c1d95)',
    heroBg: '#0f3460',
    cor: '#a78bfa',
    licoes: typeof CORUJA_LICOES !== 'undefined' ? CORUJA_LICOES : [],
    trilhas: [

// ── PERSISTÊNCIA ──────────────────────────────────────────────
function carregarEstado() {
  try {
    const salvo = localStorage.getItem('cw_estado')
    return salvo ? { ...ESTADO_INICIAL, ...JSON.parse(salvo) } : { ...ESTADO_INICIAL }
  } catch { return { ...ESTADO_INICIAL } }
}

function salvarEstado() {
  localStorage.setItem('cw_estado', JSON.stringify(estado))
}

// ── STREAK ────────────────────────────────────────────────────
function verificarStreak() {
  const hoje = new Date().toDateString()
  const ontem = new Date(Date.now() - 86400000).toDateString()
  if (estado.ultimoAcesso === hoje) return
  if (estado.ultimoAcesso === ontem) estado.streak++
  else if (estado.ultimoAcesso !== null) estado.streak = 1
  else estado.streak = 1
  estado.ultimoAcesso = hoje
  salvarEstado()
}

// ── RENDER HEADER ─────────────────────────────────────────────
function renderHeader() {
  document.getElementById('xp-val').textContent = `⚡ ${estado.xp} XP`
  document.getElementById('streak-val').textContent = `🔥 ${estado.streak} dias`
}

// ── TELA INICIAL ──────────────────────────────────────────────
function renderHome() {
  const animal = ANIMAIS[estado.animalAtual]
  const prog = estado.progresso[estado.animalAtual]
  const totalLicoes = animal.licoes.length
  const feitas = prog.licoesFeitas.length
  const pct = totalLicoes > 0 ? Math.round((feitas / totalLicoes) * 100) : 0

  // mascotes
  const gridHtml = Object.entries(ANIMAIS).map(([key, a]) => {
    const desbloqueado = estado.animaisDesbloqueados.includes(key)
    const p = estado.progresso[key]
    const tot = a.licoes.length
    const f = p.licoesFeitas.length
    const pctMini = tot > 0 ? (f / tot) * 100 : 0
    return `
      <div class="mascot-btn ${estado.animalAtual === key ? 'ativo' : ''} ${!desbloqueado ? 'bloqueado' : ''}"
           onclick="${desbloqueado ? `selecionarAnimal('${key}')` : `mostrarBloqueado('${key}')`}">
        <span class="e">${desbloqueado ? a.emoji : '🔒'}</span>
        <span>${a.emoji === a.emoji && desbloqueado ? key.charAt(0).toUpperCase() + key.slice(1) : '???'}</span>
        <div class="progresso-mini"><div class="progresso-mini-fill" style="width:${pctMini}%"></div></div>
      </div>`
  }).join('')

  // trilhas
  const trilhasHtml = animal.trilhas.map((t, ti) => {
    const licoesT = t.licoes.map(i => animal.licoes[i]).filter(Boolean)
    const feitasT = licoesT.filter(l => prog.licoesFeitas.includes(l.id)).length
    const bloqueada = ti > 0 && !todasFeitasTrilha(animal, ti - 1)
    const status = bloqueada ? 'Bloqueada' : feitasT === 0 ? 'Não iniciada' : feitasT === licoesT.length ? 'Concluída ✅' : 'Em andamento'
    const badgeClass = bloqueada ? 'badge-gray' : feitasT === licoesT.length ? 'badge-green' : feitasT > 0 ? 'badge-blue' : 'badge-gray'
    const estrelas = feitasT === 0 ? 0 : feitasT === licoesT.length ? 3 : feitasT >= licoesT.length / 2 ? 2 : 1
    return `
      <div class="trilha-card ${bloqueada ? 'bloqueada' : ''}" onclick="${!bloqueada ? `iniciarTrilha(${ti})` : ''}">
        <div class="trilha-icon" style="background:${t.bg}">${t.icon}</div>
        <div class="trilha-info">
          <div class="trilha-nome">${t.nome}</div>
          <div class="trilha-desc">${t.desc}</div>
          <div class="trilha-meta">
            <span class="badge ${badgeClass}">${status}</span>
            <div class="estrelas">${[1,2,3].map(i => `<span class="estrela ${i <= estrelas ? '' : 'vazia'}">★</span>`).join('')}</div>
          </div>
        </div>
        ${bloqueada ? '<span style="font-size:18px;color:var(--text3)">🔒</span>' : ''}
      </div>`
  }).join('')

  // nós de lições
  const licoesList = animal.licoes
  const nosHtml = licoesList.slice(0, 8).map((l, i) => {
    const feita = prog.licoesFeitas.includes(l.id)
    const ehAtual = !feita && (i === 0 || prog.licoesFeitas.includes(licoesList[i-1]?.id))
    const cls = feita ? 'feito' : ehAtual ? 'atual' : 'travado'
    const linhaFeita = feita ? 'feita' : ''
    return `${i > 0 ? `<div class="no-linha ${linhaFeita}"></div>` : ''}
      <div class="no ${cls}" title="${l.titulo}" onclick="${!feita && ehAtual ? `abrirLicao(${i})` : ''}">${feita ? '✓' : ehAtual ? animal.emoji : '🔒'}</div>`
  }).join('')

  document.getElementById('home-content').innerHTML = `
    <div class="home-hero">
      <h1>Code<span>Wisdom</span></h1>
      <p>Do zero ao especialista — aprenda programação como um jogo</p>
    </div>
    <div class="mascot-grid">${gridHtml}</div>
    <div class="animal-destaque">
      <div class="animal-header" style="background:${animal.heroBg}">
        <div class="animal-avatar" style="background:${animal.bg}">${animal.emoji}</div>
        <div class="animal-info">
          <div class="fase-pill">${animal.fase}</div>
          <h2>${animal.nome}</h2>
          <div class="quote" style="color:var(--text3)">${animal.quote}</div>
        </div>
      </div>
      <div class="progresso-barra">
        <div class="prog-lbl">
          <span>Lição ${feitas} de ${totalLicoes}</span>
          <span>${pct}%</span>
        </div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="trilhas-titulo">Trilhas de hoje</div>
      ${trilhasHtml}
      <div class="nos-licoes">
        <div class="nos-titulo">Próximas lições</div>
        <div class="nos-row">${nosHtml}</div>
      </div>
    </div>`
}

function todasFeitasTrilha(animal, ti) {
  const t = animal.trilhas[ti]
  const prog = estado.progresso[estado.animalAtual]
  const licoesTrilha = t.licoes.map(i => animal.licoes[i]).filter(Boolean)
  return licoesTrilha.every(l => prog.licoesFeitas.includes(l.id))
}

function selecionarAnimal(key) {
  estado.animalAtual = key
  salvarEstado()
  renderHome()
}

function mostrarBloqueado(key) {
  const animal = ANIMAIS[key]
  alert(`🔒 ${animal.nome} ainda está bloqueada!\n\nConclua todas as lições e passe na Prova Final do animal anterior para desbloquear.`)
}

function iniciarTrilha(ti) {
  const animal = ANIMAIS[estado.animalAtual]
  const trilha = animal.trilhas[ti]
  if (!trilha.licoes.length) { alert('Lições desta trilha ainda estão sendo desenvolvidas! 🚧'); return }
  abrirLicao(trilha.licoes[0])
}

// ── LIÇÃO ─────────────────────────────────────────────────────
function abrirLicao(idx) {
  const animal = ANIMAIS[estado.animalAtual]
  licaoAtual = animal.licoes[idx]
  if (!licaoAtual) return
  etapaAtual = 0
  exercicioAtual = 0
  respostasErradas = []
  navegarTela('licao')
  renderLicao()
}

function renderLicao() {
  if (!licaoAtual) return
  const totalEtapas = 2 + licaoAtual.exercicios.length // teoria + exemplo + exercícios
  const etapasHtml = Array.from({length: totalEtapas}, (_, i) =>
    `<div class="etapa-dot ${i < etapaAtual ? 'feita' : i === etapaAtual ? 'ativa' : ''}"></div>`
  ).join('')

  let conteudo = ''
  if (etapaAtual === 0) {
    conteudo = `
      <div class="teoria-box fadeIn">
        ${licaoAtual.teoria}
      </div>
      <button class="btn btn-primario" onclick="proximaEtapa()">Entendi — ver exemplo →</button>`
  } else if (etapaAtual === 1) {
    conteudo = `
      <div class="teoria-box fadeIn">
        <h3>💡 Exemplo prático:</h3>
        ${licaoAtual.exemplo}
      </div>
      <button class="btn btn-primario" onclick="proximaEtapa()">Praticar →</button>`
  } else {
    const exIdx = etapaAtual - 2
    const ex = licaoAtual.exercicios[exIdx]
    conteudo = renderExercicio(ex, exIdx)
  }

  document.getElementById('licao-content').innerHTML = `
    <div class="licao-header">
      <button class="btn-voltar" onclick="navegarTela('home')">← Voltar</button>
      <span class="licao-titulo">${licaoAtual.titulo}</span>
      <span class="licao-xp">+${licaoAtual.xp} XP</span>
    </div>
    <div class="etapas">${etapasHtml}</div>
    <div id="conteudo-licao">${conteudo}</div>`
}

function renderExercicio(ex, idx) {
  const num = idx + 1
  const total = licaoAtual.exercicios.length
  respondido = false

  if (ex.tipo === 'multipla') {
    const opcoesHtml = ex.opcoes.map((op, i) =>
      `<button class="opcao" id="op-${i}" onclick="responderMultipla(${i})">${op}</button>`
    ).join('')
    return `
      <div class="exercicio-box fadeIn">
        <div class="exercicio-num">Exercício ${num} de ${total}</div>
        <div class="exercicio-pergunta">${ex.pergunta}</div>
        <div class="opcoes">${opcoesHtml}</div>
        <div class="feedback" id="feedback"></div>
      </div>
      <button class="btn btn-primario" id="btn-proxima" onclick="proximaEtapa()" disabled>Próximo →</button>`
  }

  if (ex.tipo === 'completar') {
    return `
      <div class="exercicio-box fadeIn">
        <div class="exercicio-num">Exercício ${num} de ${total}</div>
        <div class="exercicio-pergunta">${ex.pergunta}</div>
        <div class="completar-wrap">
          <div class="completar-codigo">${ex.codigo}</div>
          <input class="completar-input" id="resp-input" type="text" placeholder="Digite sua resposta..."
            onkeydown="if(event.key==='Enter')responderCompletar()">
        </div>
        <div class="feedback" id="feedback"></div>
      </div>
      <button class="btn btn-secundario" onclick="responderCompletar()">Verificar</button>
      <button class="btn btn-primario" id="btn-proxima" onclick="proximaEtapa()" disabled>Próximo →</button>`
  }
}

function responderMultipla(idx) {
  if (respondido) return
  respondido = true
  const ex = licaoAtual.exercicios[etapaAtual - 2]
  const correta = idx === ex.correta
  document.querySelectorAll('.opcao').forEach(b => b.disabled = true)
  document.getElementById(`op-${idx}`).classList.add(correta ? 'correta' : 'errada')
  if (!correta) {
    document.getElementById(`op-${ex.correta}`).classList.add('correta')
    registrarErro(ex.pergunta)
  }
  mostrarFeedback(correta, ex.explicacao)
  document.getElementById('btn-proxima').disabled = false
}

function responderCompletar() {
  if (respondido) return
  const ex = licaoAtual.exercicios[etapaAtual - 2]
  const input = document.getElementById('resp-input')
  if (!input) return
  const resp = input.value.trim().toLowerCase()
  const correta = resp === ex.resposta.toLowerCase()
  respondido = true
  input.disabled = true
  input.classList.add(correta ? 'correta' : 'errada')
  if (!correta) registrarErro(ex.pergunta)
  mostrarFeedback(correta, ex.explicacao)
  document.getElementById('btn-proxima').disabled = false
}

function mostrarFeedback(ok, texto) {
  const el = document.getElementById('feedback')
  if (!el) return
  el.className = `feedback visivel ${ok ? 'ok' : 'erro'}`
  el.innerHTML = `<strong>${ok ? '✅ Correto!' : '❌ Incorreto'}</strong>${texto}`
}

function registrarErro(pergunta) {
  respostasErradas.push(pergunta)
  const erros = estado.progresso[estado.animalAtual].erros
  erros[pergunta] = (erros[pergunta] || 0) + 1
  salvarEstado()
}

function proximaEtapa() {
  const totalEtapas = 2 + licaoAtual.exercicios.length
  if (etapaAtual < totalEtapas - 1) {
    etapaAtual++
    renderLicao()
  } else {
    concluirLicao()
  }
}

function concluirLicao() {
  const prog = estado.progresso[estado.animalAtual]
  if (!prog.licoesFeitas.includes(licaoAtual.id)) {
    prog.licoesFeitas.push(licaoAtual.id)
    estado.xp += licaoAtual.xp
    salvarEstado()
    mostrarXpPopup(licaoAtual.xp)
    verificarDesbloqueio()
  }

  const errosHtml = respostasErradas.length > 0
    ? `<div class="erros-box">
        <h4>📌 Pontos para revisar (${respostasErradas.length} erro${respostasErradas.length > 1 ? 's' : ''}):</h4>
        <ul>${respostasErradas.map(e => `<li>${e}</li>`).join('')}</ul>
       </div>` : ''

  document.getElementById('conteudo-licao').innerHTML = `
    <div class="conclusao">
      <div class="trophy">${respostasErradas.length === 0 ? '🏆' : '📚'}</div>
      <h2>${respostasErradas.length === 0 ? 'Perfeito!' : 'Lição Concluída!'}</h2>
      <p>${respostasErradas.length === 0 ? 'Nenhum erro! Você dominou essa lição.' : `Você errou ${respostasErradas.length} questão(ões). Revise os pontos abaixo.`}</p>
      <div class="xp-ganho">⚡ +${licaoAtual.xp} XP</div>
      ${errosHtml}
      <button class="btn btn-primario" onclick="navegarTela('home');renderHome()">Continuar →</button>
    </div>`
  renderHeader()
}

function verificarDesbloqueio() {
  const animal = ANIMAIS[estado.animalAtual]
  const prog = estado.progresso[estado.animalAtual]
  const todasFeitas = animal.licoes.every(l => prog.licoesFeitas.includes(l.id))
  if (todasFeitas) {
    const ordem = ['coruja', 'elefante', 'tartaruga', 'lobo', 'corvo', 'leao']
    const idx = ordem.indexOf(estado.animalAtual)
    if (idx < ordem.length - 1) {
      const proximo = ordem[idx + 1]
      if (!estado.animaisDesbloqueados.includes(proximo)) {
        estado.animaisDesbloqueados.push(proximo)
        salvarEstado()
        setTimeout(() => alert(`🎉 Parabéns! Você desbloqueou ${ANIMAIS[proximo].emoji} ${ANIMAIS[proximo].nome}!`), 500)
      }
    }
  }
}

function mostrarXpPopup(xp) {
  const el = document.createElement('div')
  el.className = 'xp-popup'
  el.textContent = `+${xp} XP ⚡`
  document.body.appendChild(el)
  setTimeout(() => el.remove(), 2000)
}

// ── PERFIL ────────────────────────────────────────────────────
function renderPerfil() {
  const totalXp = estado.xp
  const totalFeitas = Object.values(estado.progresso).reduce((s, p) => s + p.licoesFeitas.length, 0)
  const totalErros = Object.values(estado.progresso).reduce((s, p) => {
    return s + Object.values(p.erros).reduce((a, b) => a + b, 0)
  }, 0)

  // débito técnico
  const todosErros = []
  Object.values(estado.progresso).forEach(p => {
    Object.entries(p.erros).forEach(([pergunta, count]) => {
      todosErros.push({ pergunta, count })
    })
  })
  todosErros.sort((a, b) => b.count - a.count)

  const debitoHtml = todosErros.length === 0
    ? '<p style="color:var(--text3);font-size:14px">Nenhum erro registrado ainda. Continue estudando!</p>'
    : todosErros.slice(0, 8).map(e => `
        <div class="debito-item">
          <span>📌 ${e.pergunta.substring(0, 50)}${e.pergunta.length > 50 ? '...' : ''}</span>
          <span class="debito-count">${e.count}x</span>
        </div>`).join('')

  document.getElementById('perfil-content').innerHTML = `
    <h2 style="font-size:22px;font-weight:800;margin-bottom:20px">👤 Meu Perfil</h2>
    <div class="perfil-stats">
      <div class="stat-card"><div class="num">${totalXp}</div><div class="lbl">XP Total</div></div>
      <div class="stat-card"><div class="num">${estado.streak}</div><div class="lbl">Dias seguidos</div></div>
      <div class="stat-card"><div class="num">${totalFeitas}</div><div class="lbl">Lições feitas</div></div>
      <div class="stat-card"><div class="num">${totalErros}</div><div class="lbl">Erros totais</div></div>
    </div>
    <div class="debito-tecnico">
      <h3>📌 Débito Técnico — revisão prioritária</h3>
      ${debitoHtml}
    </div>
    <button class="btn btn-secundario" style="margin-top:20px" onclick="if(confirm('Resetar todo o progresso?')){localStorage.clear();location.reload()}">
      🗑️ Resetar progresso
    </button>`
}

// ── NAVEGAÇÃO ─────────────────────────────────────────────────
function navegarTela(id) {
  document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'))
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('ativo'))
  document.getElementById(`tela-${id}`).classList.add('ativa')
  const navMap = { home: 0, trilhas: 1, licao: 2, perfil: 4 }
  const navItems = document.querySelectorAll('.nav-item')
  if (navMap[id] !== undefined) navItems[navMap[id]]?.classList.add('ativo')

  if (id === 'home') renderHome()
  if (id === 'perfil') renderPerfil()
  if (id === 'trilhas') renderTrilhasCompleto()
}

function renderTrilhasCompleto() {
  const animal = ANIMAIS[estado.animalAtual]
  const prog = estado.progresso[estado.animalAtual]

  const html = animal.trilhas.map((t, ti) => {
    const licoesTrilha = t.licoes.map(i => animal.licoes[i]).filter(Boolean)
    const bloqueada = ti > 0 && !todasFeitasTrilha(animal, ti - 1)
    const licoesHtml = licoesTrilha.map((l, li) => {
      const feita = prog.licoesFeitas.includes(l.id)
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:18px">${feita ? '✅' : '○'}</span>
        <span style="flex:1;font-size:14px;color:${feita ? 'var(--text)' : 'var(--text2)'}">${l.titulo}</span>
        <span style="font-size:11px;color:var(--purple2);font-weight:700">+${l.xp} XP</span>
        ${!feita && !bloqueada ? `<button class="btn" style="padding:4px 12px;font-size:12px;background:var(--purple);color:#fff;border-radius:8px" onclick="abrirLicao(${t.licoes[li]})">Iniciar</button>` : ''}
      </div>`
    }).join('')

    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px;${bloqueada ? 'opacity:0.5' : ''}">
      <div style="padding:14px 16px;display:flex;gap:12px;align-items:center;background:var(--surface2)">
        <div style="width:40px;height:40px;border-radius:10px;background:${t.bg};display:flex;align-items:center;justify-content:center;font-size:20px">${t.icon}</div>
        <div>
          <div style="font-size:15px;font-weight:700">${t.nome}</div>
          <div style="font-size:12px;color:var(--text2)">${t.desc}</div>
        </div>
        ${bloqueada ? '<span style="margin-left:auto;font-size:20px">🔒</span>' : ''}
      </div>
      <div style="padding:0 16px">${licoesHtml || '<p style="padding:12px 0;color:var(--text3);font-size:13px">🚧 Lições em desenvolvimento</p>'}</div>
    </div>`
  }).join('')

  document.getElementById('trilhas-content').innerHTML = `
    <h2 style="font-size:22px;font-weight:800;margin-bottom:20px">${animal.emoji} ${animal.nome}</h2>
    ${html}`
}

// ── INIT ──────────────────────────────────────────────────────
verificarStreak()
renderHeader()
navegarTela('home')

</script>
</body>
</html>
